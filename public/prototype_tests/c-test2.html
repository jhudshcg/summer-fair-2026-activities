<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfect Elastic Scratch C-Block</title>
  <style>
    :root {
      /* Shared Architectural Alignment Dimensions */
      --backbone-w: 24px;         /* Absolute thickness of the left vertical spine */
      --stroke: 2px;              /* Crisp border outline thickness */
      --outer-radius: 12px;       /* Curve radius for the top/bottom outer corners */
      --inner-radius: 12px;       /* Curve radius for the inside mouth corners */
      
      --outline-color: #ff9800;   /* Scratch Orange Outline Line */
      --internal-color: #ffb74d;  /* Lighter Orange Block Body Fill */
    }

    body {
      background-color: #0f172a;  /* Dark background canvas from your screenshot */
      padding: 50px;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* ==========================================================================
       THE SYSTEM CORE (GRID TRACK LAYOUT)
       Allows the opaque text content overlay to natively drive the row heights.
       ========================================================================== */
    .scratch-block-system {
      display: inline-grid;
      grid-template-rows: auto auto auto; /* [Header Row] [Mouth Row] [Footer Row] */
      min-width: 240px;
      max-width: 340px; /* Constrained to force mobile text wrapping instantly */
      position: relative;
    }

    /* ==========================================================================
       LAYER 1: UNIFIED VISUAL SKIN (Translucent Background Engine)
       Spans across all grid cells to prevent overlapping alpha channel lines.
       ========================================================================= */
    .scratch-visual-skin {
      grid-area: 1 / 1 / -1 / -1; /* Fills the entire grid container block */
      position: relative;
      width: 100%;
      height: 100%;
      
      opacity: 0.65;              /* Master frame transparency profile */
      transform: translateZ(0);   /* GPU Acceleration trick for older mobile viewports */
    }

    /* The Solid Orange Background Base Stroke Layer */
    .skin-stroke-base {
      position: absolute;
      inset: 0;
      background-color: var(--outline-color);
      border-radius: var(--outer-radius);
      
      /* THE MAGIC PERCENTAGE CARVING: Carves out the mouth slot dynamically.
         By using grid row references (like calc(100% - 24px)), it tracks structural
         changes without needing JavaScript or static pixel coordinates. */
      clip-path: polygon(
        0% 0%, 100% 0%, 
        100% var(--header-height, 44px), 
        var(--backbone-w) var(--header-height, 44px), 
        var(--backbone-w) calc(100% - var(--footer-height, 24px)), 
        100% calc(100% - var(--footer-height, 24px)), 
        100% 100%, 0% 100%
      );
    }

    /* The Internal Color Fill Layer (Offset inward by the stroke thickness) */
    .skin-internal-fill {
      position: absolute;
      inset: var(--stroke);
      background-color: var(--internal-color);
      border-radius: calc(var(--outer-radius) - var(--stroke));
      
      /* Mirror cutout track shifted inward to account for the outline width */
      clip-path: polygon(
        0% 0%, 100% 0%, 
        100% calc(var(--header-height, 44px) - var(--stroke)), 
        calc(var(--backbone-w) - var(--stroke)) calc(var(--header-height, 44px) - var(--stroke)), 
        calc(var(--backbone-w) - var(--stroke)) calc(100% - var(--footer-height, 24px) + var(--stroke)), 
        100% calc(100% - var(--footer-height, 24px) + var(--stroke)), 
        100% 100%, 0% 100%
      );
    }

    /* --- INNER CORNER RADII TRACING SHAPES ---
       By positioning native border blocks behind the text layer inside our visual skin container,
       the inner mouth loops remain sharp and clear with zero overlay fragments. */
    .scratch-visual-skin::before,
    .scratch-visual-skin::after {
      content: "";
      position: absolute;
      width: var(--inner-radius);
      height: var(--inner-radius);
      background-color: var(--internal-color);
      border: var(--stroke) solid var(--outline-color);
      box-sizing: border-box;
      z-index: 2;
    }

    /* Top Inner Mouth Corner Alignment */
    .scratch-visual-skin::before {
      top: calc(var(--header-height, 44px) - var(--stroke));
      left: calc(var(--backbone-w) - var(--stroke));
      border-bottom-right-radius: var(--inner-radius);
      border-top: none;
      border-left: none;
    }

    /* Bottom Inner Mouth Corner Alignment */
    .scratch-visual-skin::after {
      bottom: calc(var(--footer-height, 24px) - var(--stroke));
      left: calc(var(--backbone-w) - var(--stroke));
      border-top-right-radius: var(--inner-radius);
      border-bottom: none;
      border-left: none;
    }

    /* ==========================================================================
       LAYER 2: OPAQUE CONTENT INTERFACE OVERLAY
       Kept at 100% solid opacity for clean interactive legibility.
       ========================================================================== */
    .scratch-content-overlay {
      grid-area: 1 / 1 / -1 / -1;
      display: flex;
      flex-direction: column;
      z-index: 5; /* Pushes text links completely clear of the background layer */
      color: white;
      font-weight: bold;
      font-size: 13px;
    }

    /* Header Row: Dictates dynamic layout heights natively when text-wrapping triggers */
    .scratch-header-content {
      grid-row: 1;
      min-height: 44px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;            /* Triggers native text wrapping on mobile viewports */
      padding: 8px 12px;
      gap: 8px;
      box-sizing: border-box;
    }

    .scratch-condition-pill {
      background-color: #2cb7e0;
      border: 2px solid #1ba5cd;
      padding: 4px 10px;
      border-radius: 6px;
    }

    /* Mouth Content Dropzone Area */
    .scratch-mouth-content {
      grid-row: 2;
      /* Pad past the left spine + the inner radius cutout track zone */
      padding: 12px 12px 12px calc(var(--backbone-w) + var(--inner-radius));
      display: flex;
      flex-direction: column;
      gap: 6px; 
    }

    .scratch-command-block {
      background-color: #4caf50;
      border: 2px solid #388e3c;
      padding: 6px 12px;
      border-radius: 4px;
      width: fit-content;
      min-width: 110px;
    }

    /* Fixed-height bottom closure footer row */
    .scratch-footer-content {
      grid-row: 3;
      height: 24px; 
    }
  </style>
</head>
<body>

  <div class="scratch-block-system" id="blockSystem">

    <!-- LAYER 1: Translucent Unified Visual Frame Background Skins -->
    <div class="scratch-visual-skin" aria-hidden="true">
      <div class="skin-stroke-base"></div>
      <div class="skin-internal-fill"></div>
    </div>

    <!-- LAYER 2: 100% Solid Opaque Interaction Text & Blocks -->
    <div class="scratch-content-overlay">
      
      <!-- Top Row Header Section -->
      <div class="scratch-header-content" id="headerSection">
        <span class="scratch-label">repeat until</span>
        <div class="scratch-condition-pill">
          touching [obstacle] OR player health &lt; 50
        </div>
      </div>
      
      <!-- Center Sequenced Block Dropzone Area -->
      <div class="scratch-mouth-content">
        <div class="scratch-command-block">move 10 steps</div>
        <div class="scratch-command-block">turn 15 degrees</div>
      </div>
      
      <!-- Bottom Footer Closure Section -->
      <div class="scratch-footer-content" id="footerSection"></div>
      
    </div>

  </div>

  <!-- MINIMAL UTILITY INJECTION:
       To keep this component completely free of heavy code recalculations or manual canvas 
       re-draws, we run a tiny 3-line passive layout observer. This reads the real-time size 
       of your wrapped text headers and safely syncs the percentage math variable inside the CSS. -->
  <script>
    const header = document.getElementById('headerSection');
    const footer = document.getElementById('footerSection');
    const root = document.getElementById('blockSystem');

    const syncLayoutSlices = () => {
      root.style.setProperty('--header-height', `${header.offsetHeight}px`);
      root.style.setProperty('--footer-height', `${footer.offsetHeight}px`);
    };

    new ResizeObserver(syncLayoutSlices).observe(header);
  </script>

</body>
</html>
