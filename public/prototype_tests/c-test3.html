<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfect Fixed Scratch C-Block</title>
  <style>
    :root {
      --backbone-w: 24px;         /* Spine thickness */
      --stroke: 2px;              /* Crisp border outline thickness */
      --outer-radius: 12px;       /* Curve radius for outer corners */
      --inner-radius: 14px;       /* Curve radius for the inside mouth corners */
      
      --outline-color: #ff9800;   /* Scratch Orange Outline */
      --internal-color: #ffb74d;  /* Lighter Orange Block Fill */
    }

    body {
      background-color: #0f172a;  /* Dark layout canvas from your screenshots */
      padding: 50px;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* ==========================================================================
       THE SYSTEM CONTAINER
       A clean, robust grid that stacks the visual skin directly underneath 
       the text layer. Sizing is driven 100% natively by your text content.
       ========================================================================== */
    .scratch-block-system {
      display: inline-grid;
      grid-template-rows: auto auto auto; /* Syncs rows: [Header] [Mouth Track] [Footer] */
      min-width: 240px;
      max-width: 340px; 
      position: relative;
    }

    /* ==========================================================================
       LAYER 1: UNIFIED VISUAL SKIN (Translucent Background Layout)
       Everything flattens here at a single opacity level to avoid overlapping seams.
       ========================================================================== */
    .scratch-visual-skin {
      grid-area: 1 / 1 / -1 / -1; 
      display: flex;
      flex-direction: column;
      opacity: 0.65;               /* Universal component opacity profile */
      transform: translateZ(0);   /* GPU optimization flag for legacy mobile browsers */
    }

    /* --- 1A. THE HEADER ROW --- */
    .skin-header-row {
      background-color: var(--internal-color);
      border: var(--stroke) solid var(--outline-color);
      border-top-left-radius: var(--outer-radius);
      border-top-right-radius: var(--outer-radius);
      
      /* Pure CSS Inner Corner Carving:
         Draws a flat horizontal border line across the bottom, then carves a perfect 
         inward-facing circle right where the header meets the mouth opening. */
      background-image: 
        radial-gradient(circle at calc(var(--backbone-w) + var(--inner-radius)) 100%, transparent var(--inner-radius), var(--outline-color) calc(var(--inner-radius) + var(--stroke)), var(--internal-color) calc(var(--inner-radius) + var(--stroke) + 1px)),
        linear-gradient(to right, var(--outline-color) var(--stroke), transparent var(--stroke));
      border-bottom: var(--stroke) solid var(--outline-color);
      flex-grow: 1;
    }

    /* --- 1B. THE MOUTH BACKBONE STRIP --- */
    .skin-mouth-row {
      width: var(--backbone-w);
      background-color: var(--internal-color);
      border-left: var(--stroke) solid var(--outline-color);
      border-right: var(--stroke) solid var(--outline-color);
      box-sizing: border-box;
      flex-grow: 1;
    }

    /* --- 1C. THE FOOTER ROW --- */
    .skin-footer-row {
      background-color: var(--internal-color);
      border: var(--stroke) solid var(--outline-color);
      border-bottom-left-radius: var(--outer-radius);
      border-bottom-right-radius: var(--outer-radius);
      
      /* Pure CSS Inner Corner Carving:
         Draws a flat horizontal border line across the top, then carves the matching 
         inward-facing circle right where the footer meets the mouth track. */
      background-image: 
        radial-gradient(circle at calc(var(--backbone-w) + var(--inner-radius)) 0%, transparent var(--inner-radius), var(--outline-color) calc(var(--inner-radius) + var(--stroke)), var(--internal-color) calc(var(--inner-radius) + var(--stroke) + 1px)),
        linear-gradient(to right, var(--outline-color) var(--stroke), transparent var(--stroke));
      border-top: var(--stroke) solid var(--outline-color);
      flex-grow: 1;
    }

    /* ==========================================================================
       LAYER 2: OPAQUE INTERACTION CONTENT OVERLAY
       ========================================================================== */
    .scratch-content-overlay {
      grid-area: 1 / 1 / -1 / -1;
      display: flex;
      flex-direction: column;
      z-index: 5; 
      color: white;
      font-weight: bold;
      font-size: 13px;
      user-select: none;
    }

    /* Header Content Box: Line-wraps dynamically if the condition text is long */
    .scratch-header-content {
      grid-row: 1;
      min-height: 44px;
      display: flex;
      align-items: center;
      flex-wrap: wrap; 
      padding: 10px 12px calc(10px + var(--stroke)) 12px;
      gap: 8px;
      box-sizing: border-box;
    }

    .scratch-condition-pill {
      background-color: #2cb7e0;
      border: 2px solid #1ba5cd;
      padding: 4px 10px;
      border-radius: 6px;
    }

    /* Mouth Content Dropzone Area */
    .scratch-mouth-content {
      grid-row: 2;
      /* Indent text cleanly past the spine backbone + the new inward radius curve depth */
      padding: 12px 12px 12px calc(var(--backbone-w) + var(--inner-radius) + 6px);
      display: flex;
      flex-direction: column;
      gap: 6px; 
    }

    .scratch-command-block {
      background-color: #4caf50;
      border: 2px solid #388e3c;
      padding: 6px 12px;
      border-radius: 4px;
      width: fit-content;
      min-width: 110px;
    }

    /* Bottom fixed footer height spacer row */
    .scratch-footer-content {
      grid-row: 3;
      height: 26px; 
    }
  </style>
</head>
<body>

  <!-- Complete Automated Layout Stack -->
  <div class="scratch-block-system">

    <!-- LAYER 1: Translucent Visual Background Skin Frame -->
    <div class="scratch-visual-skin" aria-hidden="true">
      <div class="skin-header-row"></div>
      <div class="skin-mouth-row"></div>
      <div class="skin-footer-row"></div>
    </div>

    <!-- LAYER 2: 100% Solid Opaque Interaction Interface -->
    <div class="scratch-content-overlay">
      
      <!-- Top Row Header Section -->
      <div class="scratch-header-content">
        <span class="scratch-label">repeat until</span>
        <div class="scratch-condition-pill">
          touching [obstacle] OR player health &lt; 50
        </div>
      </div>
      
      <!-- Center Sequenced Block Dropzone Area -->
      <div class="scratch-mouth-content">
        <div class="scratch-command-block">move 10 steps</div>
        <div class="scratch-command-block">turn 15 degrees</div>
      </div>
      
      <!-- Bottom Footer Closure bar Section -->
      <div class="scratch-footer-content"></div>
      
    </div>

  </div>

</body>
</html>
