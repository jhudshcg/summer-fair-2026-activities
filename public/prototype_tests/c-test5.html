<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unified Solid-Slices Scratch C-Block</title>
  <style>
    :root {
      --backbone-w: 24px;         /* Thickness of the left vertical line */
      --stroke: 2px;              /* Crisp border outline thickness */
      --outer-radius: 12px;       /* Curve radius for the outer corners */
      --inner-radius: 14px;       /* Curve radius for the inward mouth corners */
      
      --outline-color: #ff9800;   /* Scratch Orange Outline */
      --internal-color: #ffb74d;  /* Lighter Orange Fill */
    }

    body {
      background-color: #0f172a;  /* Dark background canvas matches your screenshot */
      padding: 50px;
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: bold;
      font-size: 13px;
    }

    /* ==========================================================================
       THE GRID SYSTEM TRACK
       ========================================================================== */
    .scratch-block-system {
      display: inline-grid;
      grid-template-rows: auto auto auto; /* Syncs rows: [Header] [Mouth Track] [Footer] */
      min-width: 240px;
      max-width: 340px; 
      position: relative;
    }

    /* ==========================================================================
       LAYER 1: THE VISUAL FRAME SKIN (Translucent Background Layout)
       Everything flattens here at a single opacity level to avoid overlapping lines.
       ========================================================================== */
    .scratch-visual-skin {
      grid-area: 1 / 1 / -1 / -1; 
      display: flex;
      flex-direction: column;
      opacity: 0.65;               /* Universal frame opacity profile */
      transform: translateZ(0);   /* GPU optimization flag for legacy mobile browsers */
    }

    /* 1A. THE HEADER ROW: Native borders automatically handle outer corners */
    .skin-header-row {
      grid-row: 1;
      background-color: var(--internal-color);
      border: var(--stroke) solid var(--outline-color);
      border-top-left-radius: var(--outer-radius);
      border-top-right-radius: var(--outer-radius);
      height: 100%;
    }

    /* 1B. THE MOUTH BACKBONE STRIP:
       This segment contains ONLY the left border. The pseudo-elements sit 
       completely INSIDE its boundaries to draw the inward-facing curves smoothly. */
    .skin-mouth-row {
      grid-row: 2;
      position: relative;         
      width: var(--backbone-w);
      background-color: var(--internal-color);
      border-left: var(--stroke) solid var(--outline-color);
      height: 100%;
    }

    /* TOP INNER INWARD-FACING RADIUS JOINT */
    .skin-mouth-row::before {
      content: "";
      position: absolute;
      top: calc(-1 * var(--stroke));
      left: calc(var(--backbone-w) - var(--stroke));
      width: var(--inner-radius);
      height: var(--inner-radius);
      
      /* Creates the perfect inward loop profile */
      border-bottom-left-radius: var(--inner-radius);
      border-bottom: var(--stroke) solid var(--outline-color);
      border-left: var(--stroke) solid var(--outline-color);
      
      /* The shadow paints the background color outside the arc to seamlessly match the block */
      box-shadow: -4px 4px 0 4px var(--internal-color);
    }

    /* BOTTOM INNER INWARD-FACING RADIUS JOINT */
    .skin-mouth-row::after {
      content: "";
      position: absolute;
      bottom: calc(-1 * var(--stroke));
      left: calc(var(--backbone-w) - var(--stroke));
      width: var(--inner-radius);
      height: var(--inner-radius);
      
      border-top-left-radius: var(--inner-radius);
      border-top: var(--stroke) solid var(--outline-color);
      border-left: var(--stroke) solid var(--outline-color);
      
      box-shadow: -4px -4px 0 4px var(--internal-color);
    }

    /* 1C. THE FOOTER ROW: Native borders automatically handle outer corners */
    .skin-footer-row {
      grid-row: 3;
      background-color: var(--internal-color);
      border: var(--stroke) solid var(--outline-color);
      border-bottom-left-radius: var(--outer-radius);
      border-bottom-right-radius: var(--outer-radius);
      height: 100%;
    }

    /* ==========================================================================
       LAYER 2: OPAQUE INTERACTION OVERLAY (Text and Code Blocks)
       ========================================================================== */
    .scratch-content-overlay {
      grid-area: 1 / 1 / -1 / -1;
      display: flex;
      flex-direction: column;
      z-index: 5; 
      color: white;
      user-select: none;
    }

    .scratch-header-content {
      grid-row: 1;
      min-height: 44px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;            /* Handles line-wrapping seamlessly with no JS */
      padding: 8px 12px;
      gap: 8px;
      box-sizing: border-box;
    }

    .scratch-condition-pill {
      background-color: #2cb7e0;
      border: 2px solid #1ba5cd;
      padding: 4px 10px;
      border-radius: 6px;
    }

    .scratch-mouth-content {
      grid-row: 2;
      /* Indent text elements past the spine backbone + the new inward radius curve depth */
      padding: 12px 12px 12px calc(var(--backbone-w) + var(--inner-radius) + 4px);
      display: flex;
      flex-direction: column;
      gap: 6px; 
    }

    .scratch-command-block {
      background-color: #4caf50;
      border: 2px solid #388e3c;
      padding: 6px 12px;
      border-radius: 4px;
      width: fit-content;
      min-width: 110px;
    }

    .scratch-footer-content {
      grid-row: 3;
      height: 24px;               /* Fixed anchor height for the bottom closure */
    }
  </style>
</head>
<body>

  <!-- Complete Functional Visual Stack -->
  <div class="scratch-block-system">

    <!-- LAYER 1: Translucent Visual Background Skins -->
    <div class="scratch-visual-skin" aria-hidden="true">
      <div class="skin-header-row"></div>
      <div class="skin-mouth-row"></div>
      <div class="skin-footer-row"></div>
    </div>

    <!-- LAYER 2: 100% Solid Opaque Interface -->
    <div class="scratch-content-overlay">
      
      <!-- Header section handles line-wrapping natively -->
      <div class="scratch-header-content">
        <span class="scratch-label">repeat until</span>
        <div class="scratch-condition-pill">
          touching [obstacle] OR player health &lt; 50
        </div>
      </div>
      
      <!-- Middle mouth drops blocks cleanly onto an open background canvas -->
      <div class="scratch-mouth-content">
        <div class="scratch-command-block">move 10 steps</div>
        <div class="scratch-command-block">turn 15 degrees</div>
      </div>
      
      <div class="scratch-footer-content"></div>
      
    </div>

  </div>

</body>
</html>
